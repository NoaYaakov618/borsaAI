services:
  - type: web
    name: borsaai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://borsa-ai.vercel.app   # update this after Vercel deploy
      - key: TICK_INTERVAL_SECONDS
        value: "60"
